# win-validator deployment — the privilege split.
#
#   [ ingress container ]  --(Postgres JobStore + shared job_root volume)-->  [ host pool-manager ]
#     untrusted-facing                                                          libvirt + iptables
#     unprivileged, read-only                                                   (systemd unit, see
#     no libvirt / no socket                                                     winval-pool-manager.service)
#
# This compose runs ONLY the unprivileged tiers (ingress + Postgres). The pool-manager runs on the
# HOST (it needs libvirt + iptables) as a systemd unit and connects to the Postgres published below
# + reads the same job_root host path. Bring up:
#     mkdir -p /var/lib/winval/jobs && chown 10001:10001 /var/lib/winval/jobs
#     docker compose -f deploy/docker-compose.yml up --build -d
#     sudo systemctl start winval-pool-manager
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: winval
      POSTGRES_USER: winval
      POSTGRES_PASSWORD: ${WINVAL_PG_PASSWORD:-winval}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"   # the HOST pool-manager connects here
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winval"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  ingress:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ingress
    environment:
      BLASTBOX_DATABASE_URL: postgresql://winval:${WINVAL_PG_PASSWORD:-winval}@postgres:5432/winval
      WINVAL_JOB_ROOT: /var/lib/winval/jobs
      AUTHENTICODE_MAX_UPLOAD_MB: "1024"
    volumes:
      - /var/lib/winval/jobs:/var/lib/winval/jobs   # SHARED host path with the pool-manager
    ports:
      - "8099:8099"
    user: "10001:10001"
    read_only: true            # defense-in-depth: only the job_root volume + /tmp are writable
    tmpfs:
      - /tmp
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
